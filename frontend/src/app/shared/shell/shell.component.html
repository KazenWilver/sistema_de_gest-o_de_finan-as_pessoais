<nav class="top-nav">
  <div class="nav-inner">
    <a class="nav-logo" routerLink="/dashboard">
      <span class="logo-mark">SGFP</span>
      <span class="logo-divider"></span>
      <span class="logo-sub">{{ i18n.t('nav.finances') }}</span>
    </a>

    <div class="nav-links" [class.open]="menuOpen">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.dashboard') }}</a>
      <a class="nav-link" routerLink="/transactions" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.transactions') }}</a>
      <a class="nav-link" routerLink="/accounts" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.accounts') }}</a>
      <a class="nav-link" routerLink="/categories" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.categories') }}</a>
      <a class="nav-link" routerLink="/budgets" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.budgets') }}</a>
      <a class="nav-link" routerLink="/reports" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.reports') }}</a>
      <a class="nav-link" *ngIf="auth.isAdmin" routerLink="/admin" routerLinkActive="active" (click)="menuOpen=false">{{ i18n.t('nav.admin') }}</a>
      <hr class="nav-divider show-mobile-only" style="width: 100%; border: none; border-top: 1px solid var(--color-hairline); margin: var(--sp-xs) 0;">
      <a class="nav-link show-mobile-only" routerLink="/settings" routerLinkActive="active" (click)="menuOpen=false">⚙️ {{ i18n.t('nav.settings') }}</a>
      <button class="nav-link btn-text-link show-mobile-only mobile-logout" (click)="onLogout(); menuOpen=false" style="text-align: left; background: none; border: none; cursor: pointer; display: flex; align-items: center; width: 100%; padding: 12px 0;">🚪 {{ i18n.t('nav.logout') }}</button>
    </div>

    <div class="nav-actions">
      <select class="lang-picker" [ngModel]="i18n.currentLang" (ngModelChange)="i18n.setLanguage($event)">
        @for (lang of i18n.languages; track lang.code) {
          <option [value]="lang.code">{{ lang.label }}</option>
        }
      </select>

      <button class="btn-icon theme-toggle" (click)="theme.toggleTheme()" [title]="theme.currentTheme === 'dark' ? i18n.t('theme.light') : i18n.t('theme.dark')">
        {{ theme.currentTheme === 'dark' ? '☀️' : '🌙' }}
      </button>

      <a class="nav-link hide-mobile" routerLink="/settings" routerLinkActive="active">⚙️</a>

      <button class="btn-text-link hide-mobile" (click)="onLogout()">{{ i18n.t('nav.logout') }}</button>

      <button class="hamburger" (click)="menuOpen = !menuOpen">
        <span [class.open]="menuOpen"></span>
      </button>
    </div>
  </div>
</nav>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<app-toast></app-toast>
<app-confirm-dialog></app-confirm-dialog>
