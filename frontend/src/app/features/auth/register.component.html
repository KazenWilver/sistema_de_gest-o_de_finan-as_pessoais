<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">💰</div>
      <h1 class="auth-title">Criar Conta</h1>
      <p class="auth-subtitle">Junte-se ao SGFP e organize suas finanças</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="name">Nome</label>
        <input class="form-input" id="name" type="text" [(ngModel)]="name" name="name"
               placeholder="Seu nome completo" autocomplete="name">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" [(ngModel)]="email" name="email"
               placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" [(ngModel)]="password" name="password"
               placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>

      <div class="form-error" *ngIf="error">{{ error }}</div>

      <button class="btn btn-primary btn-lg auth-submit" type="submit" [disabled]="loading">
        {{ loading ? 'A criar...' : 'Criar Conta' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Já tem conta? <a routerLink="/auth/login">Entrar</a></p>
    </div>
  </div>
</div>
