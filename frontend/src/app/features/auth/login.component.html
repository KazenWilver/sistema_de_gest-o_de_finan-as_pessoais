<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">💰</div>
      <h1 class="auth-title">SGFP</h1>
      <p class="auth-subtitle">Sistema de Gestão Financeira Pessoal</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" [(ngModel)]="email" name="email"
               placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" [(ngModel)]="password" name="password"
               placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="form-error" *ngIf="error">{{ error }}</div>

      <button class="btn btn-primary btn-lg auth-submit" type="submit" [disabled]="loading">
        {{ loading ? 'A entrar...' : 'Entrar' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Não tem conta? <a routerLink="/auth/register">Criar conta</a></p>
    </div>
  </div>
</div>
