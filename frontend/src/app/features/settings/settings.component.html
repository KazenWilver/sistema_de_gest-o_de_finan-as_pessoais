<div class="page-container">
  <div class="page-header">
    <div><h1 class="page-title">{{ i18n.t('settings.title') }}</h1><p class="page-subtitle">{{ i18n.t('settings.subtitle') }}</p></div>
  </div>

  <div class="settings-grid">
    <!-- Profile -->
    <div class="card">
      <h2 class="card-title" style="margin-bottom:var(--sp-lg)">{{ i18n.t('settings.profile') }}</h2>
      <div class="form-group"><label class="form-label">{{ i18n.t('auth.name') }}</label><input class="form-input" [(ngModel)]="profile.name"></div>
      <div class="form-group"><label class="form-label">{{ i18n.t('auth.email') }}</label><input class="form-input" type="email" [(ngModel)]="profile.email"></div>
      <div class="form-group"><label class="form-label">{{ i18n.t('acc.currency') }}</label>
        <select class="form-select" [(ngModel)]="profile.currency">
          <option value="AOA">AOA - Kwanza</option><option value="USD">USD - Dólar</option><option value="EUR">EUR - Euro</option>
        </select>
      </div>
      <button class="btn btn-primary" (click)="saveProfile()">{{ i18n.t('settings.save_profile') }}</button>
    </div>

    <!-- Security -->
    <div class="card">
      <h2 class="card-title" style="margin-bottom:var(--sp-lg)">{{ i18n.t('settings.security') }}</h2>
      <div class="form-group"><label class="form-label">{{ i18n.t('settings.current_pw') }}</label><input class="form-input" type="password" [(ngModel)]="passwords.current_password"></div>
      <div class="form-group"><label class="form-label">{{ i18n.t('settings.new_pw') }}</label><input class="form-input" type="password" [(ngModel)]="passwords.new_password"></div>
      <div class="form-group"><label class="form-label">{{ i18n.t('settings.confirm_pw') }}</label><input class="form-input" type="password" [(ngModel)]="passwords.confirm"></div>
      <button class="btn btn-primary" (click)="changePassword()">{{ i18n.t('settings.change_pw') }}</button>
    </div>

    <!-- Appearance -->
    <div class="card">
      <h2 class="card-title" style="margin-bottom:var(--sp-lg)">{{ i18n.t('settings.theme') }}</h2>
      <div class="theme-toggle-row">
        <div class="theme-option" [class.active]="theme.currentTheme === 'light'" (click)="theme.setTheme('light')">
          <div class="theme-preview light-preview"></div>
          <span>Light</span>
        </div>
        <div class="theme-option" [class.active]="theme.currentTheme === 'dark'" (click)="theme.setTheme('dark')">
          <div class="theme-preview dark-preview"></div>
          <span>Dark</span>
        </div>
      </div>
    </div>

    <!-- Language -->
    <div class="card">
      <h2 class="card-title" style="margin-bottom:var(--sp-lg)">{{ i18n.t('settings.language') }}</h2>
      <div class="lang-grid">
        @for (lang of i18n.languages; track lang.code) {
          <button class="lang-btn" [class.active]="i18n.currentLang === lang.code" (click)="i18n.setLanguage(lang.code)">
            {{ lang.label }}
          </button>
        }
      </div>
    </div>
  </div>
</div>
