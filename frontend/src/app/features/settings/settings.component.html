<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Definições</h1>
  </div>

  <div class="settings-grid">
    <!-- Profile -->
    <div class="card">
      <h2 class="card-title">Perfil</h2>
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input class="form-input" [(ngModel)]="profile.name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" [value]="profile.email" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">Moeda Padrão</label>
        <select class="form-select" [(ngModel)]="profile.currency">
          <option value="AOA">AOA — Kwanza</option>
          <option value="USD">USD — Dólar</option>
          <option value="EUR">EUR — Euro</option>
          <option value="BRL">BRL — Real</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Idioma</label>
        <select class="form-select" [(ngModel)]="profile.language">
          <option value="pt">Português</option>
          <option value="en">English</option>
        </select>
      </div>
      <p class="msg" *ngIf="message">{{ message }}</p>
      <button class="btn btn-primary" (click)="saveProfile()">Guardar Alterações</button>
    </div>

    <!-- Theme -->
    <div class="card">
      <h2 class="card-title">Aparência</h2>
      <div class="theme-option">
        <span>Tema Actual: <strong>{{ (theme.theme$ | async) === 'dark' ? 'Escuro' : 'Claro' }}</strong></span>
        <button class="btn btn-secondary" (click)="toggleTheme()">
          {{ (theme.theme$ | async) === 'dark' ? '☀️ Modo Claro' : '🌙 Modo Escuro' }}
        </button>
      </div>
    </div>

    <!-- Password -->
    <div class="card">
      <h2 class="card-title">Alterar Password</h2>
      <div class="form-group">
        <label class="form-label">Password Actual</label>
        <input class="form-input" type="password" [(ngModel)]="passwords.current_password">
      </div>
      <div class="form-group">
        <label class="form-label">Nova Password</label>
        <input class="form-input" type="password" [(ngModel)]="passwords.new_password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar</label>
        <input class="form-input" type="password" [(ngModel)]="passwords.confirm">
      </div>
      <p class="msg" *ngIf="pwMessage">{{ pwMessage }}</p>
      <button class="btn btn-primary" (click)="changePassword()">Alterar Password</button>
    </div>
  </div>
</div>
