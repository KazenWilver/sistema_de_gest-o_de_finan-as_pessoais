<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">🛡️ Painel Admin</h1>
  </div>

  <div class="grid grid-3" style="margin-bottom:var(--space-xl)">
    <div class="card" style="text-align:center">
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-tertiary);font-weight:600">Utilizadores</div>
      <div style="font-size:28px;font-weight:700;margin-top:4px">{{ stats.total_users || 0 }}</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-tertiary);font-weight:600">Transações</div>
      <div style="font-size:28px;font-weight:700;margin-top:4px">{{ stats.total_transactions || 0 }}</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-tertiary);font-weight:600">Contas</div>
      <div style="font-size:28px;font-weight:700;margin-top:4px">{{ stats.total_accounts || 0 }}</div>
    </div>
  </div>

  <div class="card" style="padding:0">
    <div class="table-container">
      <table>
        <thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Role</th><th>Criado</th></tr></thead>
        <tbody>
          @for (u of users; track u.id) {
            <tr>
              <td>{{ u.id }}</td>
              <td><strong>{{ u.name }}</strong></td>
              <td>{{ u.email }}</td>
              <td><span class="badge" [class.badge-income]="u.role==='admin'" [class.badge-neutral]="u.role!=='admin'">{{ u.role }}</span></td>
              <td>{{ u.created_at }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
